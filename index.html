<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Converter</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Nunito:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: #ffffff;
    background-image:
      repeating-linear-gradient(90deg,
        rgba(178,166,214,0.55) 0px, rgba(178,166,214,0.55) 36px,
        transparent 36px, transparent 80px),
      repeating-linear-gradient(0deg,
        rgba(178,166,214,0.55) 0px, rgba(178,166,214,0.55) 36px,
        transparent 36px, transparent 80px);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: #ffd6e0;
    border-radius: 16px;
    padding: 36px 40px 40px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 8px 40px rgba(180,100,130,0.13);
  }

  /* pixel hearts */
  .px-hearts {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: #f06090;
    text-shadow: 1px 1px 0 #d04870;
    margin-left: 2px;
    vertical-align: middle;
    position: relative;
    top: -2px;
  }

  .card-title {
    font-family: 'Lora', serif;
    font-size: 28px;
    font-weight: 600;
    color: #7a3a4a;
    margin-bottom: 4px;
    letter-spacing: -0.3px;
  }
  .card-title span { font-style: italic; color: #c06080; }

  .card-sub {
    font-size: 13px;
    color: #b07888;
    margin-bottom: 4px;
    font-weight: 500;
  }

  .rate-status {
    font-size: 11px;
    font-weight: 600;
    color: #b07888;
    margin-bottom: 22px;
    letter-spacing: 0.3px;
  }

  .amount-field { margin-bottom: 22px; }

  .field-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: #b07888;
    margin-bottom: 8px;
    display: block;
  }

  input[type="number"] {
    width: 100%;
    background: #fff0f4;
    border: 2px solid #f5c0d0;
    border-radius: 16px;
    padding: 14px 18px;
    font-size: 26px;
    font-family: 'Lora', serif;
    font-weight: 600;
    color: #7a3a4a;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="number"]:focus {
    border-color: #e8819a;
    box-shadow: 0 0 0 4px rgba(232,129,154,0.15);
  }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

  .currency-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: end;
    gap: 10px;
    margin-bottom: 22px;
  }

  .currency-col { display: flex; flex-direction: column; }

  .currency-selector {
    background: #fff0f4;
    border: 2px solid #f5c0d0;
    border-radius: 16px;
    padding: 10px 12px;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s;
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
  }
  .currency-selector:focus-within {
    border-color: #e8819a;
    box-shadow: 0 0 0 4px rgba(232,129,154,0.15);
  }

  .flag { font-size: 26px; line-height: 1; flex-shrink: 0; }
  .selector-text { display: flex; flex-direction: column; flex: 1; min-width: 0; }
  .selector-code { font-size: 15px; font-weight: 700; color: #7a3a4a; line-height: 1.1; }
  .selector-name { font-size: 11px; color: #b07888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
  .selector-arrow { font-size: 11px; color: #c06080; flex-shrink: 0; }

  .hidden-select {
    position: absolute; inset: 0;
    opacity: 0; width: 100%; height: 100%;
    cursor: pointer; font-size: 16px;
  }

  .swap-col {
    display: flex; align-items: center;
    justify-content: center; padding-bottom: 2px;
  }

  .swap-btn {
    background: #fff0f4;
    border: 2px solid #f5c0d0;
    border-radius: 50%;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 18px; color: #c06080;
    flex-shrink: 0;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), background 0.2s;
  }
  .swap-btn:hover { transform: rotate(180deg); background: #ffc8d8; }

  .convert-btn {
    width: 100%;
    padding: 16px;
    border-radius: 20px;
    border: none;
    background: #f06090;
    color: white;
    font-family: 'Nunito', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.4px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 0 #d04870, 0 8px 20px rgba(240,96,144,0.25);
  }
  .convert-btn:hover {
    background: #e84e80;
    transform: translateY(-2px);
    box-shadow: 0 6px 0 #d04870, 0 12px 28px rgba(240,96,144,0.3);
  }
  .convert-btn:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 #d04870, 0 4px 12px rgba(240,96,144,0.2);
  }

  .result-wrap {
    margin-top: 20px;
    padding: 4px 2px;
    display: none;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .result-wrap.show { display: flex; flex-direction: column; gap: 4px; }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.92); }
    to   { opacity: 1; transform: scale(1); }
  }

  .result-eyebrow {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.8px;
    color: #c8909f;
    margin-bottom: 2px;
  }

  .result-amount {
    font-family: 'Lora', serif;
    font-size: 42px;
    font-weight: 600;
    color: #7a3a4a;
    line-height: 1.15;
    letter-spacing: -0.5px;
  }

  .result-rate {
    margin-top: 4px;
    font-size: 12.5px;
    color: #c8909f;
    font-weight: 500;
  }

  .credit {
    margin-top: 20px;
    text-align: center;
    font-size: 12px;
    color: #b07888;
    font-weight: 500;
    letter-spacing: 0.3px;
  }
  .credit span {
    font-family: 'Lora', serif;
    font-style: italic;
    color: #c06080;
    font-weight: 600;
  }

  @media (max-width: 400px) {
    body { padding: 16px; align-items: flex-start; padding-top: 32px; }
    .card { padding: 28px 20px 28px; }
    .card-title { font-size: 22px; }
    .currency-row { grid-template-columns: 1fr; gap: 8px; }
    .swap-col { justify-content: flex-start; padding-left: 4px; padding-bottom: 0; }
    .swap-btn { width: 34px; height: 34px; font-size: 16px; transform: rotate(90deg); }
    .swap-btn:hover { transform: rotate(270deg); }
    .flag { font-size: 22px; }
    .selector-code { font-size: 13px; }
    input[type="number"] { font-size: 22px; padding: 12px 14px; }
    .result-amount { font-size: 32px; }
  }
</style>
</head>
<body>

<div class="card">

  <div class="card-title"><span class="px-hearts">♥</span> Money <span>Converter</span> <span class="px-hearts">♥</span></div>
  <div class="card-sub">Quick & easy currency exchange</div>
  <div class="rate-status" id="rateStatus">Loading live rates…</div>

  <div class="amount-field">
    <span class="field-label">How much?</span>
    <input type="number" id="amount" value="100" min="0" step="any">
  </div>

  <div class="currency-row">
    <div class="currency-col">
      <span class="field-label">From</span>
      <div class="currency-selector">
        <span class="flag" id="fromFlag">🇺🇸</span>
        <div class="selector-text">
          <span class="selector-code" id="fromCode">USD</span>
          <span class="selector-name" id="fromName">US Dollar</span>
        </div>
        <span class="selector-arrow">▾</span>
        <select class="hidden-select" id="fromCurrency" onchange="onFromChange()"></select>
      </div>
    </div>
    <div class="swap-col">
      <button class="swap-btn" onclick="swapCurrencies()">⇄</button>
    </div>
    <div class="currency-col">
      <span class="field-label">To</span>
      <div class="currency-selector">
        <span class="flag" id="toFlag">🇲🇦</span>
        <div class="selector-text">
          <span class="selector-code" id="toCode">MAD</span>
          <span class="selector-name" id="toName">Moroccan Dirham</span>
        </div>
        <span class="selector-arrow">▾</span>
        <select class="hidden-select" id="toCurrency" onchange="onToChange()"></select>
      </div>
    </div>
  </div>

  <button class="convert-btn" onclick="convert()">Convert</button>

  <div class="result-wrap" id="resultBox">
    <div class="result-eyebrow">You get</div>
    <div class="result-amount" id="resultValue"></div>
    <div class="result-rate" id="resultRate"></div>
  </div>

  <div class="credit">designed by <span>Yassire Lina</span></div>
</div>

<script>
const currencies = [
  { code: 'USD', name: 'US Dollar',          symbol: '$',    flag: '🇺🇸' },
  { code: 'EUR', name: 'Euro',               symbol: '€',    flag: '🇪🇺' },
  { code: 'GBP', name: 'British Pound',      symbol: '£',    flag: '🇬🇧' },
  { code: 'MAD', name: 'Moroccan Dirham',    symbol: 'MAD',  flag: '🇲🇦' },
  { code: 'JPY', name: 'Japanese Yen',       symbol: '¥',    flag: '🇯🇵' },
  { code: 'CAD', name: 'Canadian Dollar',    symbol: 'C$',   flag: '🇨🇦' },
  { code: 'AUD', name: 'Australian Dollar',  symbol: 'A$',   flag: '🇦🇺' },
  { code: 'CHF', name: 'Swiss Franc',        symbol: 'Fr',   flag: '🇨🇭' },
  { code: 'CNY', name: 'Chinese Yuan',       symbol: '¥',    flag: '🇨🇳' },
  { code: 'INR', name: 'Indian Rupee',       symbol: '₹',    flag: '🇮🇳' },
  { code: 'BRL', name: 'Brazilian Real',     symbol: 'R$',   flag: '🇧🇷' },
  { code: 'MXN', name: 'Mexican Peso',       symbol: 'MX$',  flag: '🇲🇽' },
  { code: 'KRW', name: 'South Korean Won',   symbol: '₩',    flag: '🇰🇷' },
  { code: 'SGD', name: 'Singapore Dollar',   symbol: 'S$',   flag: '🇸🇬' },
  { code: 'HKD', name: 'Hong Kong Dollar',   symbol: 'HK$',  flag: '🇭🇰' },
  { code: 'NZD', name: 'New Zealand Dollar', symbol: 'NZ$',  flag: '🇳🇿' },
  { code: 'ZAR', name: 'South African Rand', symbol: 'R',    flag: '🇿🇦' },
  { code: 'TRY', name: 'Turkish Lira',       symbol: '₺',    flag: '🇹🇷' },
  { code: 'AED', name: 'UAE Dirham',         symbol: 'AED',  flag: '🇦🇪' },
  { code: 'SAR', name: 'Saudi Riyal',        symbol: 'SAR',  flag: '🇸🇦' },
  { code: 'EGP', name: 'Egyptian Pound',     symbol: 'E£',   flag: '🇪🇬' },
  { code: 'DKK', name: 'Danish Krone',       symbol: 'kr',   flag: '🇩🇰' },
  { code: 'SEK', name: 'Swedish Krona',      symbol: 'kr',   flag: '🇸🇪' },
  { code: 'NOK', name: 'Norwegian Krone',    symbol: 'kr',   flag: '🇳🇴' },
  { code: 'PLN', name: 'Polish Złoty',       symbol: 'zł',   flag: '🇵🇱' },
  { code: 'CZK', name: 'Czech Koruna',       symbol: 'Kč',   flag: '🇨🇿' },
  { code: 'HUF', name: 'Hungarian Forint',   symbol: 'Ft',   flag: '🇭🇺' },
  { code: 'RON', name: 'Romanian Leu',       symbol: 'lei',  flag: '🇷🇴' },
  { code: 'BGN', name: 'Bulgarian Lev',      symbol: 'лв',   flag: '🇧🇬' },
  { code: 'RUB', name: 'Russian Ruble',      symbol: '₽',    flag: '🇷🇺' },
  { code: 'UAH', name: 'Ukrainian Hryvnia',  symbol: '₴',    flag: '🇺🇦' },
  { code: 'ILS', name: 'Palestinian Pound',  symbol: '₪',    flag: '🇵🇸' },
  { code: 'KWD', name: 'Kuwaiti Dinar',      symbol: 'KD',   flag: '🇰🇼' },
  { code: 'QAR', name: 'Qatari Riyal',       symbol: 'QR',   flag: '🇶🇦' },
  { code: 'DZD', name: 'Algerian Dinar',     symbol: 'DA',   flag: '🇩🇿' },
  { code: 'TND', name: 'Tunisian Dinar',     symbol: 'DT',   flag: '🇹🇳' },
  { code: 'NGN', name: 'Nigerian Naira',     symbol: '₦',    flag: '🇳🇬' },
  { code: 'KES', name: 'Kenyan Shilling',    symbol: 'KSh',  flag: '🇰🇪' },
  { code: 'PKR', name: 'Pakistani Rupee',    symbol: '₨',    flag: '🇵🇰' },
  { code: 'THB', name: 'Thai Baht',          symbol: '฿',    flag: '🇹🇭' },
  { code: 'VND', name: 'Vietnamese Dong',    symbol: '₫',    flag: '🇻🇳' },
  { code: 'IDR', name: 'Indonesian Rupiah',  symbol: 'Rp',   flag: '🇮🇩' },
  { code: 'MYR', name: 'Malaysian Ringgit',  symbol: 'RM',   flag: '🇲🇾' },
  { code: 'PHP', name: 'Philippine Peso',    symbol: '₱',    flag: '🇵🇭' },
  { code: 'TWD', name: 'Taiwan Dollar',      symbol: 'NT$',  flag: '🇹🇼' },
  { code: 'ARS', name: 'Argentine Peso',     symbol: '$',    flag: '🇦🇷' },
  { code: 'CLP', name: 'Chilean Peso',       symbol: '$',    flag: '🇨🇱' },
  { code: 'COP', name: 'Colombian Peso',     symbol: '$',    flag: '🇨🇴' },
  { code: 'PEN', name: 'Peruvian Sol',       symbol: 'S/',   flag: '🇵🇪' },
  { code: 'UYU', name: 'Uruguayan Peso',     symbol: '$U',   flag: '🇺🇾' },
  { code: 'JMD', name: 'Jamaican Dollar',    symbol: 'J$',   flag: '🇯🇲' },
  { code: 'ISK', name: 'Icelandic Króna',    symbol: 'kr',   flag: '🇮🇸' },
];

const fallbackRates = {
  USD:1, EUR:0.92, GBP:0.79, MAD:10.05, JPY:149.5, CAD:1.36,
  AUD:1.53, CHF:0.89, CNY:7.24, INR:83.1, BRL:4.97, MXN:17.2,
  KRW:1325, SGD:1.34, HKD:7.82, NZD:1.63, ZAR:18.7, TRY:30.5,
  AED:3.67, SAR:3.75, EGP:30.9, DKK:6.88, SEK:10.4, NOK:10.6,
  PLN:4.05, CZK:23.1, HUF:360, RON:4.57, BGN:1.8,
  RUB:92, UAH:38.5, ILS:3.7, KWD:0.31, QAR:3.64,
  DZD:135, TND:3.1, NGN:1550, KES:130,
  PKR:278, THB:35.5, VND:24500, IDR:15600, MYR:4.7, PHP:56.5, TWD:32.5,
  ARS:870, CLP:920, COP:3950, PEN:3.72, UYU:39, JMD:155, ISK:138
};

let rates = { ...fallbackRates };

async function loadRates() {
  const statusEl = document.getElementById('rateStatus');
  try {
    const res  = await fetch('https://v6.exchangerate-api.com/v6/621fabc96b6d04ac61741831/latest/USD');
    const data = await res.json();
    if (data.result === 'success') {
      rates = data.conversion_rates;
      const updated = new Date(data.time_last_update_utc).toLocaleDateString('en-US', { day:'numeric', month:'short', year:'numeric' });
      statusEl.textContent = 'Live rates · updated ' + updated;
      statusEl.style.color = '#8fba8a';
    }
  } catch {
    statusEl.textContent = 'Approximate rates';
  }
}

function populateSelects() {
  const from = document.getElementById('fromCurrency');
  const to   = document.getElementById('toCurrency');
  currencies.forEach(c => {
    from.innerHTML += `<option value="${c.code}">${c.flag} ${c.code} — ${c.name}</option>`;
    to.innerHTML   += `<option value="${c.code}">${c.flag} ${c.code} — ${c.name}</option>`;
  });
  from.value = 'USD';
  to.value   = 'MAD';
}

function updateDisplay(side, code) {
  const c = currencies.find(x => x.code === code);
  document.getElementById(side + 'Flag').textContent = c.flag;
  document.getElementById(side + 'Code').textContent = c.code;
  document.getElementById(side + 'Name').textContent = c.name;
}

function onFromChange() { updateDisplay('from', document.getElementById('fromCurrency').value); }
function onToChange()   { updateDisplay('to',   document.getElementById('toCurrency').value); }

function swapCurrencies() {
  const from = document.getElementById('fromCurrency');
  const to   = document.getElementById('toCurrency');
  [from.value, to.value] = [to.value, from.value];
  onFromChange(); onToChange();
}

function convert() {
  const amount = parseFloat(document.getElementById('amount').value);
  const from   = document.getElementById('fromCurrency').value;
  const to     = document.getElementById('toCurrency').value;
  if (isNaN(amount) || amount < 0) return;

  const result   = (amount / rates[from]) * rates[to];
  const rate     = rates[to] / rates[from];
  const toCurr   = currencies.find(c => c.code === to);
  const formatted = result.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  document.getElementById('resultValue').textContent = `${toCurr.symbol} ${formatted}`;
  document.getElementById('resultRate').textContent  = `1 ${from} ≈ ${rate.toFixed(4)} ${to}`;

  const box = document.getElementById('resultBox');
  box.classList.remove('show');
  void box.offsetWidth;
  box.classList.add('show');
}

populateSelects();
loadRates();
</script>
</body>
</html>
