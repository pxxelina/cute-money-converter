<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Money Converter</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Nunito:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="card">
  <div class="card-title">
    <span class="px-hearts">♥</span> Money <span>Converter</span> <span class="px-hearts">♥</span>
  </div>
  <div class="card-sub">Quick & easy currency exchange</div>
  <div class="rate-status" id="rateStatus">Loading live rates…</div>

  <div class="amount-field">
    <span class="field-label">How much?</span>
    <input type="number" id="amount" value="100" min="0" step="any" placeholder="0.00">
  </div>

  <div class="currency-row">
    <div class="currency-col">
      <span class="field-label">From</span>
      <div class="currency-selector">
        <span class="flag" id="fromFlag">🇺🇸</span>
        <div class="selector-text">
          <span class="selector-code" id="fromCode">USD</span>
          <span class="selector-name" id="fromName">US Dollar</span>
        </div>
        <span class="selector-arrow">▾</span>
        <select class="hidden-select" id="fromCurrency"></select>
      </div>
    </div>
    
    <div class="swap-col">
      <button class="swap-btn" title="Swap currencies">⇄</button>
    </div>
    
    <div class="currency-col">
      <span class="field-label">To</span>
      <div class="currency-selector">
        <span class="flag" id="toFlag">🇲🇦</span>
        <div class="selector-text">
          <span class="selector-code" id="toCode">MAD</span>
          <span class="selector-name" id="toName">Moroccan Dirham</span>
        </div>
        <span class="selector-arrow">▾</span>
        <select class="hidden-select" id="toCurrency"></select>
      </div>
    </div>
  </div>

  <button class="convert-btn">Convert</button>

  <div class="result-wrap" id="resultBox">
    <div class="result-eyebrow">You get</div>
    <div class="result-amount">
      <span id="resultValue"></span>
      <button class="copy-btn" id="copyBtn" title="Copy to clipboard">
        <span>📋</span> Copy
      </button>
    </div>
    <div class="result-rate" id="resultRate"></div>
  </div>

  <div class="credit">designed by <span>Yassire Lina</span></div>
</div>

<!-- App Data and Logic -->
<script src="data.js"></script>
<script src="scripts.js"></script>
</body>
</html>
